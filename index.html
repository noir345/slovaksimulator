<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 650px;
            width: 100%;
        }
        h2 { margin-top: 0; color: #333; margin-bottom: 15px; }
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .mode-btn {
            padding: 8px 12px;
            border: 2px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .mode-btn.active {
            background: #007bff;
            color: white;
        }
        .settings {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: left;
            font-size: 0.9rem;
            border: 1px solid #dee2e6;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 15px;
        }
        .settings strong { grid-column: 1 / -1; margin-bottom: 5px; display: block; }
        .settings label {
            display: block;
            cursor: pointer;
        }
        
        .question {
            font-size: 1.5rem;
            margin: 10px 0 20px 0;
            font-weight: bold;
            color: #2c3e50;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feedback { height: 25px; margin-bottom: 5px; font-weight: bold; font-size: 1.1rem;}
        
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        button.option-btn {
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        button.option-btn:hover { background-color: #f8f9fa; border-color: #ccc; }
        button.option-btn.correct { background-color: #d4edda; border-color: #28a745; color: #155724; }
        button.option-btn.wrong { background-color: #f8d7da; border-color: #dc3545; color: #721c24; }

        .score { margin-top: 15px; color: #666; font-size: 0.95rem; font-weight: bold; }
        .hidden { display: none !important; }
        
        @media (max-width: 480px) {
            .settings { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Тренажер</h2>
    
    <div class="mode-selector">
        <button id="btnModeVerbs" class="mode-btn active" onclick="setMode('verbs')">Граматика</button>
        <button id="btnModeVocab" class="mode-btn" onclick="setMode('vocab')">Слова</button>
    </div>
    
    <div id="settingsVerbs" class="settings">
        <strong>Граматика:</strong>
        <label><input type="checkbox" id="chkOld" checked> База (Robiť, Hrať...)</label>
        <label><input type="checkbox" id="chkByt" checked> Дієслово BYŤ (Бути)</label>
        <label><input type="checkbox" id="chkNew" checked> Група -ovať (Pracovať...)</label>
        <label><input type="checkbox" id="chkModal"> Модальні (Musieť, Môcť...)</label>
        <label><input type="checkbox" id="chkPast"> Минулий час (Rozumel, Rozhodol...)</label>
    </div>

    <div id="settingsVocab" class="settings hidden">
        <strong>Теми словника:</strong>
        <label><input type="checkbox" id="catShops" checked> 🏪 Магазини</label>
        <label><input type="checkbox" id="catClothes"> 👕 Одяг</label>
        <label><input type="checkbox" id="catFeelings"> 🎭 Емоції та стан</label>
        <label><input type="checkbox" id="catThings"> 🪑 Речі та дім</label>
        <label><input type="checkbox" id="catAnimals"> 🐾 Тварини</label>
        <label><input type="checkbox" id="catProfessions"> 💼 Професії</label>
        <label><input type="checkbox" id="catColors"> 🎨 Кольори</label>
        <label><input type="checkbox" id="catNumbers"> 🔢 Числа (0-100)</label>
        <label><input type="checkbox" id="catQuestions"> ❓ Питання</label>
    </div>

    <div class="feedback" id="feedback"></div>
    <div class="question" id="question">...</div>
    <div class="options" id="options"></div>
    
    <div class="score">Рахунок: <span id="scoreVal" style="color: green;">0</span> | Помилок: <span id="mistakesVal" style="color: red;">0</span></div>
</div>

<script>
    const dataOld = {
        'robiť': ['robím', 'robíš', 'robí', 'robíme', 'robíte', 'robia'],
        'kúpiť': ['kúpim', 'kúpiš', 'kúpi', 'kúpime', 'kúpite', 'kúpia'],
        'hrať':  ['hrám',  'hráš',  'hrá',  'hráme',  'hráte',  'hrajú'],
        'volať': ['volám', 'voláš', 'volá', 'voláme', 'voláte', 'volajú'],
        'mať':   ['mám',   'máš',   'má',   'máme',   'máte',   'majú']
    };
    const dataByt = {
        'byť': ['som', 'si', 'je', 'sme', 'ste', 'sú']
    };
    const dataNew = {
        'čítať':    ['čítam', 'čítaš', 'číta', 'čítame', 'čítate', 'čítajú'],
        'pracovať': ['pracujem', 'pracuješ', 'pracuje', 'pracujeme', 'pracujete', 'pracujú'],
        'cestovať': ['cestujem', 'cestuješ', 'cestuje', 'cestujeme', 'cestujete', 'cestujú'],
        'učiť':     ['učím', 'učíš', 'učí', 'učíme', 'učíte', 'učia']
    };
    const dataModal = {
        'musieť':  ['musím', 'musíš', 'musí', 'musíme', 'musíte', 'musia'],
        'môcť':    ['môžem', 'môžeš', 'môže', 'môžeme', 'môžete', 'môžu'],
        'chcieť':  ['chcem', 'chceš', 'chce', 'chceme', 'chcete', 'chcú'],
        'vedieť':  ['viem', 'vieš', 'vie', 'vieme', 'viete', 'vedia']
    };
    const dataPast = {
        'rozumieť (min. čas)':  ['rozumel som', 'rozumel si', 'rozumel', 'rozumeli sme', 'rozumeli ste', 'rozumeli'],
        'rozhodnúť sa (min. čas)': ['rozhodol som sa', 'rozhodol si sa', 'rozhodol sa', 'rozhodli sme sa', 'rozhodli ste sa', 'rozhodli sa'],
        'musieť (min. čas)':    ['musel som', 'musel si', 'musel', 'museli sme', 'museli ste', 'museli'],
        'chcieť (min. čas)':    ['chcel som', 'chcel si', 'chcel', 'chceli sme', 'chceli ste', 'chceli'],
        'smiet\' (min. čas)':   ['smel som', 'smel si', 'smel', 'smeli sme', 'smeli ste', 'smeli'],
        'robiť (min. čas - чол)': ['robil som', 'robil si', 'robil', 'robili sme', 'robili ste', 'robili'],
        'mať (min. čas - чол)': ['mal som', 'mal si', 'mal', 'mali sme', 'mali ste', 'mali'],
        'volať (min. čas - чол)': ['volal som', 'volal si', 'volal', 'volali sme', 'volali ste', 'volali']
    };
    const pronouns = ['Ja', 'Ty', 'On', 'My', 'Vy', 'Oni'];

    const vocabData = [
        {sk: 'Obchod', uk: 'Магазин', cat: 'catShops'},
        {sk: 'Potraviny', uk: 'Продуктовий магазин', cat: 'catShops'},
        {sk: 'Pekáreň', uk: 'Пекарня', cat: 'catShops'},
        {sk: 'Lekáreň', uk: 'Аптека', cat: 'catShops'},
        {sk: 'Drogéria', uk: 'Побутова хімія / Косметика', cat: 'catShops'},
        {sk: 'Mäsiarstvo', uk: 'М\'ясний магазин', cat: 'catShops'},
        {sk: 'Kníhkupectvo', uk: 'Книжковий магазин', cat: 'catShops'},
        {sk: 'Kvetinárstvo', uk: 'Квітковий магазин', cat: 'catShops'},
        {sk: 'Oblečenie', uk: 'Магазин одягу', cat: 'catShops'},
        {sk: 'Obuv', uk: 'Взуттєвий магазин', cat: 'catShops'},
        {sk: 'Reštaurácia', uk: 'Ресторан', cat: 'catShops'},
        {sk: 'Kaviareň', uk: 'Кав\'ярня', cat: 'catShops'},
        {sk: 'Nákupné centrum', uk: 'Торговий центр', cat: 'catShops'},
        {sk: 'Pyžamo', uk: 'Піжама', cat: 'catClothes'},
        {sk: 'Bunda', uk: 'Куртка', cat: 'catClothes'},
        {sk: 'Nohavice', uk: 'Штани', cat: 'catClothes'},
        {sk: 'Tričko', uk: 'Футболка', cat: 'catClothes'},
        {sk: 'Topánky', uk: 'Взуття', cat: 'catClothes'},
        {sk: 'Šaty', uk: 'Одяг / Сукня', cat: 'catClothes'},
        {sk: 'Ponožky', uk: 'Шкарпетки', cat: 'catClothes'},
        {sk: 'Sveter', uk: 'Светр', cat: 'catClothes'},
        {sk: 'Nohavičky', uk: 'Трусики', cat: 'catClothes'},
        {sk: 'Trenky', uk: 'Шорти', cat: 'catClothes'},
        {sk: 'Tielko', uk: 'Майка', cat: 'catClothes'},
        {sk: 'Pančuchy', uk: 'Панчохи', cat: 'catClothes'},
        {sk: 'Šťastný', uk: 'Щасливий', cat: 'catFeelings'},
        {sk: 'Smutný', uk: 'Сумний', cat: 'catFeelings'},
        {sk: 'Nahnevaný', uk: 'Сердитий', cat: 'catFeelings'},
        {sk: 'Unavený', uk: 'Втомлений', cat: 'catFeelings'},
        {sk: 'Hladný', uk: 'Голодний', cat: 'catFeelings'},
        {sk: 'Smädný', uk: 'Хочу пити', cat: 'catFeelings'},
        {sk: 'Bojím sa', uk: 'Я наляканий', cat: 'catFeelings'},
        {sk: 'Spokojný', uk: 'Задоволений', cat: 'catFeelings'},
        {sk: 'Zima', uk: 'Холодно', cat: 'catFeelings'},
        {sk: 'Teplo', uk: 'Тепло', cat: 'catFeelings'},
        {sk: 'Potrebujem objať', uk: 'Мені потрібні обійми', cat: 'catFeelings'},
        {sk: 'Mačka', uk: 'Кішка', cat: 'catAnimals'},
        {sk: 'Pes', uk: 'Собака', cat: 'catAnimals'},
        {sk: 'Papagáj', uk: 'Папуга', cat: 'catAnimals'},
        {sk: 'Korytnačka', uk: 'Черепаха', cat: 'catAnimals'},
        {sk: 'Vojak', uk: 'Солдат', cat: 'catProfessions'},
        {sk: 'Šofér', uk: 'Водій', cat: 'catProfessions'},
        {sk: 'Zubár', uk: 'Стоматолог', cat: 'catProfessions'},
        {sk: 'Policajt', uk: 'Поліцейський', cat: 'catProfessions'},
        {sk: 'Učiteľ', uk: 'Вчитель', cat: 'catProfessions'},
        {sk: 'Zverolekár', uk: 'Ветеринар', cat: 'catProfessions'},
        {sk: 'Letec', uk: 'Пілот', cat: 'catProfessions'},
        {sk: 'Novinár', uk: 'Журналіст', cat: 'catProfessions'},
        {sk: 'Pero', uk: 'Ручка', cat: 'catThings'},
        {sk: 'Кlávesnica', uk: 'Клавіатура', cat: 'catThings'},
        {sk: 'Sтôl', uk: 'Стіл', cat: 'catThings'},
        {sk: 'Sтоlička', uk: 'Стілець', cat: 'catThings'},
        {sk: 'Okno', uk: 'Вікно', cat: 'catThings'},
        {sk: 'Taška', uk: 'Сумка', cat: 'catThings'},
        {sk: 'Auto', uk: 'Авто', cat: 'catThings'},
        {sk: 'Kniha', uk: 'Книга', cat: 'catThings'},
        {sk: 'Počítač', uk: 'Комп\'ютер', cat: 'catThings'},
        {sk: 'Lampa', uk: 'Лампа', cat: 'catThings'},
        {sk: 'Tlačiareň', uk: 'Принтер', cat: 'catThings'},
        {sk: 'Uterák', uk: 'Рушник', cat: 'catThings'},
        {sk: 'Deka', uk: 'Ковдра', cat: 'catThings'},
        {sk: 'Žalúzie', uk: 'Жалюзі', cat: 'catThings'},
        {sk: 'biela', uk: 'біла', cat: 'catColors'},
        {sk: 'čierna', uk: 'чорна', cat: 'catColors'},
        {sk: 'modrá', uk: 'синя', cat: 'catColors'},
        {sk: 'zelená', uk: 'зелена', cat: 'catColors'},
        {sk: 'červená', uk: 'червона', cat: 'catColors'},
        {sk: 'farebná', uk: 'кольорова', cat: 'catColors'},
        {sk: 'desať (10)', uk: 'десять', cat: 'catNumbers'},
        {sk: 'dvadsať (20)', uk: 'двадцять', cat: 'catNumbers'},
        {sk: 'päťdesiat (50)', uk: 'п\'ятдесят', cat: 'catNumbers'},
        {sk: 'kde', uk: 'де', cat: 'catQuestions'},
        {sk: 'prečo', uk: 'чому', cat: 'catQuestions'},
        {sk: 'keď', uk: 'коли', cat: 'catQuestions'}
    ];

    let currentMode = 'verbs';
    let score = 0;
    let mistakes = 0;
    let isWaiting = false;

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btnModeVerbs').classList.toggle('active', mode === 'verbs');
        document.getElementById('btnModeVocab').classList.toggle('active', mode === 'vocab');
        
        document.getElementById('settingsVerbs').classList.toggle('hidden', mode === 'vocab');
        document.getElementById('settingsVocab').classList.toggle('hidden', mode === 'verbs');
        
        document.getElementById('feedback').innerText = '';
        startGame();
    }

    function startGame() {
        isWaiting = false;
        if (currentMode === 'verbs') {
            playVerbs();
        } else {
            playVocab();
        }
    }

    function playVerbs() {
        let activeData = {};
        if (document.getElementById('chkOld').checked) Object.assign(activeData, dataOld);
        if (document.getElementById('chkByt').checked) Object.assign(activeData, dataByt);
        if (document.getElementById('chkNew').checked) Object.assign(activeData, dataNew);
        if (document.getElementById('chkModal').checked) Object.assign(activeData, dataModal);
        if (document.getElementById('chkPast').checked) Object.assign(activeData, dataPast);

        const verbs = Object.keys(activeData);
        if (verbs.length === 0) {
            document.getElementById('question').innerText = "Обери тему!";
            document.getElementById('options').innerHTML = '';
            return;
        }

        const currentVerb = verbs[Math.floor(Math.random() * verbs.length)];
        const currentIndex = Math.floor(Math.random() * 6); 
        const pronoun = pronouns[currentIndex];
        document.getElementById('question').innerText = `${pronoun} + ${currentVerb.toUpperCase()}`;

        const correctAns = activeData[currentVerb][currentIndex];
        let options = generateFourOptions(correctAns, activeData[currentVerb]);
        renderOptions(options, correctAns);
    }

    function playVocab() {
        let activeVocab = vocabData.filter(item => {
            return document.getElementById(item.cat) && document.getElementById(item.cat).checked;
        });

        if (activeVocab.length < 4) {
            document.getElementById('question').innerText = "Обери теми!";
            document.getElementById('options').innerHTML = '';
            return;
        }

        const currentItem = activeVocab[Math.floor(Math.random() * activeVocab.length)];
        document.getElementById('question').innerText = currentItem.sk;

        let allUkAnswers = vocabData.map(i => i.uk);
        let options = generateFourOptions(currentItem.uk, allUkAnswers);
        renderOptions(options, currentItem.uk);
    }

    function generateFourOptions(correct, allData) {
        let options = [correct];
        while (options.length < 4) {
            let randomIdx = Math.floor(Math.random() * allData.length);
            let wrongAns = allData[randomIdx];
            if (!options.includes(wrongAns)) options.push(wrongAns);
        }
        return options.sort(() => Math.random() - 0.5);
    }

    function renderOptions(options, correctAns) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, correctAns);
            container.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected, correct) {
        if (isWaiting) return;
        isWaiting = true;

        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true); 

        if (selected === correct) {
            btn.classList.add('correct');
            document.getElementById('feedback').innerText = '✅ Правильно!';
            document.getElementById('feedback').style.color = '#28a745';
            score++;
        } else {
            btn.classList.add('wrong');
            buttons.forEach(b => {
                if(b.innerText === correct) b.classList.add('correct');
            });
            document.getElementById('feedback').innerText = `❌ Помилка! Правильно: ${correct}`;
            document.getElementById('feedback').style.color = '#dc3545';
            mistakes++;
        }

        document.getElementById('scoreVal').innerText = score;
        document.getElementById('mistakesVal').innerText = mistakes;

        setTimeout(() => {
            document.getElementById('feedback').innerText = '';
            startGame();
        }, 1600); 
    }

    ['chkOld', 'chkByt', 'chkNew', 'chkModal', 'chkPast', 'catShops', 'catClothes', 'catFeelings', 'catThings', 'catAnimals', 'catProfessions', 'catColors', 'catNumbers', 'catQuestions'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.addEventListener('change', startGame);
    });

    startGame();
</script>

</body>
</html>
