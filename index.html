<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h2 { margin-top: 0; color: #333; margin-bottom: 20px; }
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .mode-btn {
            padding: 10px 15px;
            border: 2px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .mode-btn.active {
            background: #007bff;
            color: white;
        }
        .settings {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 0.95rem;
            border: 1px solid #dee2e6;
        }
        .settings label {
            display: block;
            margin: 8px 0;
            cursor: pointer;
        }
        .question {
            font-size: 1.6rem;
            margin: 20px 0;
            font-weight: bold;
            color: #2c3e50;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button.option-btn {
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        button.option-btn:hover { background-color: #f8f9fa; border-color: #ccc; }
        button.option-btn.correct { background-color: #d4edda; border-color: #28a745; color: #155724; }
        button.option-btn.wrong { background-color: #f8d7da; border-color: #dc3545; color: #721c24; }
        .score { margin-top: 20px; color: #666; font-size: 1rem; font-weight: bold; }
        .feedback { height: 25px; margin-bottom: 5px; font-weight: bold; font-size: 1.1rem;}
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Тренажер</h2>
    
    <div class="mode-selector">
        <button id="btnModeVerbs" class="mode-btn active" onclick="setMode('verbs')">Відмінювання дієслів</button>
        <button id="btnModeVocab" class="mode-btn" onclick="setMode('vocab')">Вчити слова</button>
    </div>
    
    <div id="settingsVerbs" class="settings">
        <strong>Обери групи дієслів:</strong>
        <label><input type="checkbox" id="chkOld"> База (Robiť, Hrať...)</label>
        <label><input type="checkbox" id="chkByt"> Дієслово BYŤ (Бути)</label>
        <label><input type="checkbox" id="chkNew"> Група -ovať (Pracovať...)</label>
        <label><input type="checkbox" id="chkModal"> Модальні (Musieť, Môcť...)</label>
        <label><input type="checkbox" id="chkPast" checked> Минулий час (Rozumel, Rozhodol...)</label>
    </div>

    <div id="settingsVocab" class="settings hidden">
        <strong>Обери теми для словника:</strong>
        <label><input type="checkbox" id="catFamily"> Сім'я та стосунки</label>
        <label><input type="checkbox" id="catPhrases"> Фрази та займенники</label>
        <label><input type="checkbox" id="catTime"> Час (Минуле/Теперішнє)</label>
        <label><input type="checkbox" id="catTimeFuture"> Час (Майбутнє/Дні тижня)</label>
        <label><input type="checkbox" id="catVarious"> Різні слова</label>
        <label><input type="checkbox" id="catPastPhrases" checked> Нові слова (-núť, минулий час)</label>
    </div>

    <div class="feedback" id="feedback"></div>
    <div class="question" id="question">...</div>
    <div class="options" id="options"></div>
    
    <div class="score">Рахунок: <span id="scoreVal" style="color: green;">0</span> | Помилок: <span id="mistakesVal" style="color: red;">0</span></div>
</div>

<script>
    const dataOld = {
        'robiť': ['robím', 'robíš', 'robí', 'robíme', 'robíte', 'robia'],
        'kúpiť': ['kúpim', 'kúpiš', 'kúpi', 'kúpime', 'kúpite', 'kúpia'],
        'hrať':  ['hrám',  'hráš',  'hrá',  'hráme',  'hráte',  'hrajú'],
        'volať': ['volám', 'voláš', 'volá', 'voláme', 'voláte', 'volajú'],
        'mať':   ['mám',   'máš',   'má',   'máme',   'máte',   'majú']
    };
    const dataByt = {
        'byť': ['som', 'si', 'je', 'sme', 'ste', 'sú']
    };
    const dataNew = {
        'čítať':    ['čítam', 'čítaš', 'číta', 'čítame', 'čítate', 'čítajú'],
        'pracovať': ['pracujem', 'pracuješ', 'pracuje', 'pracujeme', 'pracujete', 'pracujú'],
        'cestovať': ['cestujem', 'cestuješ', 'cestuje', 'cestujeme', 'cestujete', 'cestujú'],
        'učiť':     ['učím', 'učíš', 'učí', 'učíme', 'učíte', 'učia']
    };
    const dataModal = {
        'musieť':  ['musím', 'musíš', 'musí', 'musíme', 'musíte', 'musia'],
        'môcť':    ['môžem', 'môžeš', 'môže', 'môžeme', 'môžete', 'môžu'],
        'chcieť':  ['chcem', 'chceš', 'chce', 'chceme', 'chcete', 'chcú'],
        'vedieť':  ['viem', 'vieš', 'vie', 'vieme', 'viete', 'vedia']
    };
    const dataPast = {
        'rozumieť (min. čas - він/вони)':  ['rozumel som', 'rozumel si', 'rozumel', 'rozumeli sme', 'rozumeli ste', 'rozumeli'],
        'rozhodnúť sa (min. čas - він/вони)': ['rozhodol som sa', 'rozhodol si sa', 'rozhodol sa', 'rozhodli sme sa', 'rozhodli ste sa', 'rozhodli sa'],
        'musieť (min. čas - він/вони)':    ['musel som', 'musel si', 'musel', 'museli sme', 'museli ste', 'museli'],
        'chcieť (min. čas - він/вони)':    ['chcel som', 'chcel si', 'chcel', 'chceli sme', 'chceli ste', 'chceli'],
        'smiet\' (min. čas - він/вони)':   ['smel som', 'smel si', 'smel', 'smeli sme', 'smeli ste', 'smeli']
    };
    const pronouns = ['Ja', 'Ty', 'On', 'My', 'Vy', 'Oni'];

    const vocabData = [
        {sk: 'Cítim sa zle', uk: 'Я почуваюся погано', cat: 'catPhrases'},
        {sk: 'Cítim sa výborne', uk: 'Я почуваюся чудово', cat: 'catPhrases'},
        {sk: 'jej', uk: 'її', cat: 'catPhrases'},
        {sk: 'jeho', uk: 'його', cat: 'catPhrases'},
        {sk: 'ich', uk: 'їх', cat: 'catPhrases'},
        {sk: 'Nerozumiem', uk: 'Я не розумію', cat: 'catPhrases'},
        {sk: 'zase / znova', uk: 'знову', cat: 'catPhrases'},
        {sk: 'zatiaľ', uk: 'поки', cat: 'catPhrases'},
        {sk: 'práve (teraz)', uk: 'саме (зараз)', cat: 'catPhrases'},
        {sk: 'konečne', uk: 'нарешті', cat: 'catPhrases'},
        {sk: 'teda', uk: 'отже / так', cat: 'catPhrases'},
        {sk: 'asi', uk: 'мабуть / напевно', cat: 'catPhrases'},
        {sk: 'možno', uk: 'можливо', cat: 'catPhrases'},
        {sk: 'naozaj?', uk: 'справді?', cat: 'catPhrases'},
        
        {sk: 'starý otec', uk: 'дідусь', cat: 'catFamily'},
        {sk: 'stará mama', uk: 'бабуся', cat: 'catFamily'},
        {sk: 'svokor', uk: 'свекор / тесть', cat: 'catFamily'},
        {sk: 'svokra', uk: 'свекруха / теща', cat: 'catFamily'},
        {sk: 'ženatý muž', uk: 'одружений чоловік', cat: 'catFamily'},
        {sk: 'vydatá žena', uk: 'заміжня жінка', cat: 'catFamily'},
        {sk: 'slobodný / slobodná', uk: 'неодружений / незаміжня', cat: 'catFamily'},
        
        {sk: 'vždy', uk: 'завжди', cat: 'catTime'},
        {sk: 'nikdy', uk: 'ніколи', cat: 'catTime'},
        {sk: 'často', uk: 'часто', cat: 'catTime'},
        {sk: 'zriedka', uk: 'рідко', cat: 'catTime'},
        {sk: 'včera', uk: 'вчора', cat: 'catTime'},
        {sk: 'dnes', uk: 'сьогодні', cat: 'catTime'},
        
        {sk: 'zajtra', uk: 'завтра', cat: 'catTimeFuture'},
        {sk: 'nasledujúci', uk: 'наступний', cat: 'catTimeFuture'},
        {sk: 'víkend', uk: 'вихідні', cat: 'catTimeFuture'},
        {sk: 'pondelok', uk: 'понеділок', cat: 'catTimeFuture'},
        {sk: 'utorok', uk: 'вівторок', cat: 'catTimeFuture'},
        {sk: 'streda', uk: 'середа', cat: 'catTimeFuture'},
        {sk: 'štvrtok', uk: 'четвер', cat: 'catTimeFuture'},
        {sk: 'piatok', uk: 'п\'ятниця', cat: 'catTimeFuture'},
        {sk: 'sobota', uk: 'субота', cat: 'catTimeFuture'},
        {sk: 'nedeľa', uk: 'неділя', cat: 'catTimeFuture'},
        
        {sk: 'Tínedžer má 13 rokov', uk: 'Підлітку 13 років', cat: 'catVarious'},
        {sk: 'jednoduchá úloha', uk: 'просте завдання', cat: 'catVarious'},
        {sk: 'zložitá úloha', uk: 'складне завдання', cat: 'catVarious'},
        {sk: 'obliekať sa', uk: 'одягатися', cat: 'catVarious'},
        
        {sk: 'Rozumela som ti', uk: 'Я тебе зрозуміла', cat: 'catPastPhrases'},
        {sk: 'Minúť peniaze', uk: 'Витратити гроші', cat: 'catPastPhrases'},
        {sk: 'Vyhovie mi čas', uk: 'Мені підходить час', cat: 'catPastPhrases'},
        {sk: 'Vyhovie mi ponuka', uk: 'Мені підходить пропозиція', cat: 'catPastPhrases'},
        {sk: 'Ja som mrzol vtedy', uk: 'Я мерз тоді', cat: 'catPastPhrases'},
        {sk: 'Ja som stretol', uk: 'Я зустрів', cat: 'catPastPhrases'},
        {sk: 'starnúť', uk: 'старіти', cat: 'catPastPhrases'},
        {sk: 'chudnúť', uk: 'худнути', cat: 'catPastPhrases'},
        {sk: 'kradnúť', uk: 'красти', cat: 'catPastPhrases'},
        {sk: 'bohatnúť', uk: 'багатіти', cat: 'catPastPhrases'},
        {sk: 'miznúť', uk: 'зникати (напр. туман)', cat: 'catPastPhrases'},
        {sk: 'vädnúť', uk: 'в\'янути', cat: 'catPastPhrases'}
    ];

    let currentMode = 'verbs';
    let score = 0;
    let mistakes = 0;

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btnModeVerbs').classList.toggle('active', mode === 'verbs');
        document.getElementById('btnModeVocab').classList.toggle('active', mode === 'vocab');
        
        document.getElementById('settingsVerbs').classList.toggle('hidden', mode === 'vocab');
        document.getElementById('settingsVocab').classList.toggle('hidden', mode === 'verbs');
        
        document.getElementById('feedback').innerText = '';
        startGame();
    }

    function startGame() {
        if (currentMode === 'verbs') {
            playVerbs();
        } else {
            playVocab();
        }
    }

    function playVerbs() {
        let activeData = {};
        if (document.getElementById('chkOld').checked) Object.assign(activeData, dataOld);
        if (document.getElementById('chkByt').checked) Object.assign(activeData, dataByt);
        if (document.getElementById('chkNew').checked) Object.assign(activeData, dataNew);
        if (document.getElementById('chkModal').checked) Object.assign(activeData, dataModal);
        if (document.getElementById('chkPast').checked) Object.assign(activeData, dataPast);

        const verbs = Object.keys(activeData);
        if (verbs.length === 0) {
            document.getElementById('question').innerText = "Обери групу дієслів!";
            document.getElementById('options').innerHTML = '';
            return;
        }

        const currentVerb = verbs[Math.floor(Math.random() * verbs.length)];
        const currentIndex = Math.floor(Math.random() * 6); 

        const pronoun = pronouns[currentIndex];
        document.getElementById('question').innerText = `${pronoun} + ${currentVerb.toUpperCase()}`;

        const correctAns = activeData[currentVerb][currentIndex];
        let options = [correctAns];

        while (options.length < 4) {
            let randomIdx = Math.floor(Math.random() * 6);
            let wrongAns = activeData[currentVerb][randomIdx];
            if (!options.includes(wrongAns)) options.push(wrongAns);
        }

        renderButtons(options, correctAns);
    }

    function playVocab() {
        let activeVocab = vocabData.filter(item => {
            return document.getElementById(item.cat) && document.getElementById(item.cat).checked;
        });

        if (activeVocab.length === 0) {
            document.getElementById('question').innerText = "Обери тему словника!";
            document.getElementById('options').innerHTML = '';
            return;
        }

        const currentItem = activeVocab[Math.floor(Math.random() * activeVocab.length)];
        document.getElementById('question').innerText = currentItem.sk;

        let options = [currentItem.uk];
        
        while (options.length < 4) {
            let randomItem = vocabData[Math.floor(Math.random() * vocabData.length)];
            if (!options.includes(randomItem.uk)) options.push(randomItem.uk);
        }

        renderButtons(options, currentItem.uk);
    }

    function renderButtons(options, correctAns) {
        options.sort(() => Math.random() - 0.5);
        const container = document.getElementById('options');
        container.innerHTML = '';
        
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, correctAns);
            container.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected, correct) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true); 

        if (selected === correct) {
            btn.classList.add('correct');
            document.getElementById('feedback').innerText = '✅ Правильно!';
            document.getElementById('feedback').style.color = '#28a745';
            score++;
        } else {
            btn.classList.add('wrong');
            buttons.forEach(b => {
                if(b.innerText === correct) b.classList.add('correct');
            });
            document.getElementById('feedback').innerText = `❌ Помилка! Правильно: ${correct}`;
            document.getElementById('feedback').style.color = '#dc3545';
            mistakes++;
        }

        document.getElementById('scoreVal').innerText = score;
        document.getElementById('mistakesVal').innerText = mistakes;

        setTimeout(() => {
            document.getElementById('feedback').innerText = '';
            startGame();
        }, 1600); 
    }

    ['chkOld', 'chkByt', 'chkNew', 'chkModal', 'chkPast', 'catFamily', 'catPhrases', 'catTime', 'catTimeFuture', 'catVarious', 'catPastPhrases'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.addEventListener('change', startGame);
    });

    startGame();
</script>

</body>
</html>
